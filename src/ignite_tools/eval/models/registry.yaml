# Model Registry - open-source embedding models for ignite-eval
#
# This is the source of truth for which models ignite-eval knows about.
# The auto-selector uses this data to pick candidates based on user data.
#
# Fields:
#   id:           HuggingFace model ID (what you pass to SentenceTransformer)
#   name:         Short human-readable name for display
#   params:       Parameter count (approximate)
#   dim:          Output embedding dimension
#   max_tokens:   Maximum input sequence length in tokens
#   multilingual: true if the model handles multiple languages well
#   languages:    list of primary languages (empty = English only)
#   speed_tier:   fast / medium / slow / very_slow
#   quality_tier: baseline / good / better / best
#   size_mb:      Approximate download size in MB
#   matryoshka:   Supports native dimension truncation
#   prefix:       Required input prefix (empty string if none)
#   best_for:     List of use-case tags where this model excels
#   avoid_when:   List of situations where this model is a bad fit
#   description:  One-sentence plain-English explanation for non-technical users
#
# Use-case tags (for best_for / avoid_when):
#   general          - works for most tasks
#   short_text       - optimized for short inputs (< 128 tokens)
#   long_documents   - handles 2K+ token inputs well
#   multilingual     - strong cross-language performance
#   cross_lingual    - good at matching text across languages
#   code             - trained on code / technical text
#   search           - optimized for query-document retrieval
#   classification   - good for categorization tasks
#   clustering       - good for grouping similar items
#   similarity       - good for pairwise similarity scoring
#   rag              - good for retrieval-augmented generation
#   dim_reduction    - supports or tolerates dimension reduction well
#   prototyping      - fast enough for quick experiments
#   production       - good balance of quality and speed for deployment
#   cpu_friendly     - runs well without a GPU
#   speed_critical   - when throughput matters more than quality
#   quality_critical - when accuracy matters more than speed
# ─────────────────────────────────────────────────────────────────────────────

# ═══════════════════════════════════════════════════════════════════════════════
# TINY / FAST - under 30M params, 384 dim
# Best for: prototyping, CPU-only, speed-critical, baseline comparison
