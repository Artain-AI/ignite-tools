# MEDIUM-LARGE LLM-BASED - 400M-1.5B params
# The "sweet spot" for users who want LLM-quality without needing an A100.
# Practical on a single consumer GPU (8-16GB VRAM).
# ═══════════════════════════════════════════════════════════════════════════════

- id: Alibaba-NLP/gte-Qwen2-1.5B-instruct
  name: GTE-Qwen2-1.5B
  params: 1500M
  dim: 1536
  max_tokens: 32768
  multilingual: true
  languages: [en, zh, de, fr, es, ru, ja, ko]
  speed_tier: very_slow
  quality_tier: best
  size_mb: 6000
  matryoshka: false
  prefix: ""
  best_for: [quality_critical, long_documents, multilingual, rag]
  avoid_when: [speed_critical, cpu_friendly, prototyping]
  description: >
    1.5B model based on Qwen2. Near-7B quality at a fraction of the size.
    32K context. Practical on a 16GB GPU.

- id: BAAI/bge-large-en-v1.5
  name: BGE-large
  params: 335M
  dim: 1024
  max_tokens: 512
  multilingual: false
  languages: [en]
  speed_tier: slow
  quality_tier: best
  size_mb: 1300
  matryoshka: false
  prefix: ""
  best_for: [quality_critical, search, classification, production]
  avoid_when: [speed_critical, cpu_friendly, multilingual]
  description: >
    Top-tier English model. Use when quality is paramount and you have
    GPU resources. Significantly better than base models on hard tasks.

# ═══════════════════════════════════════════════════════════════════════════════
# CODE-SPECIFIC - trained on or optimized for source code
# ═══════════════════════════════════════════════════════════════════════════════

- id: jinaai/jina-embeddings-v2-base-code
  name: Jina-v2-code
  params: 137M
  dim: 768
  max_tokens: 8192
  multilingual: false
  languages: [en]
  speed_tier: medium
  quality_tier: better
  size_mb: 550
  matryoshka: false
  prefix: ""
  best_for: [code, search, long_documents]
  avoid_when: [multilingual]
  description: >
    Trained specifically on code. 8K context handles full source files.
    Use for code search, documentation retrieval, or any task where
    the input is primarily source code.

- id: Salesforce/codet5p-110m-embedding
  name: CodeT5p-110M
  params: 110M
  dim: 256
  max_tokens: 512
  multilingual: false
  languages: [en]
  speed_tier: medium
  quality_tier: good
  size_mb: 420
  matryoshka: false
  prefix: ""
  best_for: [code, classification, clustering, cpu_friendly]
  avoid_when: [multilingual, long_documents, general]
  description: >
    Code-specific embedding model from Salesforce. Lower dimensional (256)
